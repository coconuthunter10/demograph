<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Demographics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0f14;--surface:#141820;--surface2:#1c2330;--surface3:#242d3d;
  --border:rgba(255,255,255,0.08);--text:#e8eaf0;--muted:#7a8399;
  --accent:#4fc3f7;--font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;
  --male:#4fc3f7;--female:#f48fb1;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-mono);}
#header{position:fixed;top:0;left:0;right:0;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:100;gap:16px;}
#header h1{font-family:var(--font-head);font-size:18px;font-weight:700;letter-spacing:-0.02em;}
#header h1 span{color:var(--accent);}
#header .sub{font-size:11px;color:var(--muted);margin-top:1px;}
#header .divider{width:1px;height:24px;background:var(--border);}
#header .hint{font-size:11px;color:var(--muted);}
.spacer{flex:1;}
#zoom-controls{display:flex;gap:6px;align-items:center;}
.zoom-btn{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:4px;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.zoom-btn:hover{background:var(--surface3);}
#map-container{position:fixed;top:52px;left:0;right:320px;bottom:0;overflow:hidden;cursor:grab;}
#map-container.panning{cursor:grabbing;}
#map-container svg{width:100%;height:100%;}
#info-panel{position:fixed;top:52px;right:0;width:320px;height:calc(100vh - 52px);background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;z-index:50;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.panel-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;}
.panel-country{font-family:var(--font-head);font-size:20px;font-weight:700;}
.panel-pop{font-size:11px;color:var(--muted);margin-top:4px;}
.panel-pop span{color:var(--accent);font-size:13px;font-weight:500;}
.section{padding:12px 18px;border-bottom:1px solid var(--border);}
.section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.bar-row{margin-bottom:9px;position:relative;}
.bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.bar-label .name{color:var(--muted);}
.bar-label .val{color:var(--text);}
.bar-label.small .name,.bar-label.small .val{font-size:10px;}
.bar-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex;cursor:default;}
.bar-track.plain{display:block;}
.seg{height:100%;transition:width .4s cubic-bezier(.4,0,.2,1);}
.bar-fill{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.bar-fill.male{background:var(--male);}
.bar-fill.female{background:var(--female);}
/* Education */
.seg.eb-m{background:#1b5e20;} .seg.eb-f{background:#81c784;}
.seg.ec-m{background:#e65100;} .seg.ec-f{background:#ffcc80;}
.seg.el-m{background:#7f0000;} .seg.el-f{background:#ef9a9a;}
/* Age */
.seg.a0m{background:#004d40;} .seg.a0f{background:#80cbc4;}
.seg.a1m{background:#006064;} .seg.a1f{background:#80deea;}
.seg.a2m{background:#0d47a1;} .seg.a2f{background:#90caf9;}
.seg.a3m{background:#311b92;} .seg.a3f{background:#ce93d8;}
/* Race */
.seg.rm{background:#263238;} .seg.rf{background:#90a4ae;}
/* Income */
.seg.im{background:#3e2723;} .seg.if_{background:#bcaaa4;}
#bar-tip{position:fixed;pointer-events:none;background:var(--surface2);border:1px solid rgba(255,255,255,0.14);padding:8px 12px;border-radius:6px;font-size:11px;color:var(--text);z-index:500;display:none;min-width:180px;line-height:1.8;box-shadow:0 4px 20px rgba(0,0,0,.6);}
#bar-tip .tt{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
#bar-tip .tr{display:flex;justify-content:space-between;gap:14px;}
#bar-tip .tl{color:var(--muted);}
#bar-tip .tv{color:var(--text);font-weight:500;}
#bar-tip .dot{display:inline-block;width:7px;height:7px;border-radius:1px;margin-right:5px;vertical-align:middle;}
#map-tooltip{position:fixed;pointer-events:none;background:var(--surface2);border:1px solid var(--border);padding:4px 9px;border-radius:4px;font-size:11px;color:var(--text);z-index:300;display:none;white-space:nowrap;}
#placeholder{padding:60px 24px;text-align:center;color:var(--muted);font-size:12px;line-height:1.8;}
#placeholder .ph{font-size:32px;opacity:.2;margin-bottom:12px;}
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>World<span>Demography</span></h1>
    <div class="sub">Click a country to explore data</div>
  </div>
  <div class="divider"></div>
  <div class="hint">Scroll to zoom · Drag to pan · Click for details</div>
  <div class="spacer"></div>
  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-out">−</button>
    <button class="zoom-btn" id="zoom-reset" style="font-size:11px;width:auto;padding:0 8px;">Reset</button>
  </div>
</div>
<div id="map-container">
  <div id="loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:20;"><p style="color:var(--muted);font-size:12px;">Loading world map…</p></div>
  <svg id="world-svg" role="img" aria-label="Interactive world demographic map"></svg>
</div>
<div id="info-panel">
  <div class="panel-header">
    <div class="panel-country" id="panel-name">—</div>
    <div class="panel-pop">Total population: <span id="panel-pop-val">—</span></div>
  </div>
  <div id="panel-body">
    <div id="placeholder"><div class="ph">🌍</div>Click any country on the map to see demographic data here.</div>
  </div>
</div>
<div id="bar-tip"></div>
<div id="map-tooltip"></div>

// ─── helpers ─────────────────────────────────────────────────────────────────
function fmtPop(m){if(m>=1000)return(m/1000).toFixed(1)+'B';if(m>=1)return m.toFixed(1)+'M';return(m*1000).toFixed(0)+'K';}
function pct(v){return v.toFixed(1)+'%';}
function popOf(totalM,pctVal){const n=totalM*1e6*pctVal/100;if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toFixed(0);}

// ─── bar tooltip ─────────────────────────────────────────────────────────────
const barTip=document.getElementById('bar-tip');
function showBarTip(e,label,totalM,mPct,fPct){
  barTip.style.display='block';
  const mPop=popOf(totalM,mPct),fPop=popOf(totalM,fPct);
  barTip.innerHTML=`<div class="tt">${label}</div>
<div class="tr"><span class="tl"><span class="dot" style="background:var(--male)"></span>Male</span><span class="tv">${pct(mPct)} · ${mPop}</span></div>
<div class="tr"><span class="tl"><span class="dot" style="background:var(--female)"></span>Female</span><span class="tv">${pct(fPct)} · ${fPop}</span></div>`;
  moveBarTip(e);
}
function moveBarTip(e){barTip.style.left=Math.min(e.clientX+14,window.innerWidth-200)+'px';barTip.style.top=Math.max(e.clientY-70,8)+'px';}
function hideBarTip(){barTip.style.display='none';}

// ─── split bar builder ────────────────────────────────────────────────────────
function splitBar(container,rows){
  rows.forEach(r=>{
    const mW=r.tot*r.mPct/100, fW=r.tot*r.fPct/100;
    const row=document.createElement('div'); row.className='bar-row';
    row.innerHTML=`<div class="bar-label small"><span class="name">${r.label}</span><span class="val">${pct(r.tot)}</span></div>
<div class="bar-track"><div class="seg ${r.cm}" style="width:${mW}%"></div><div class="seg ${r.cf}" style="width:${fW}%"></div></div>`;
    row.querySelectorAll('.seg').forEach(s=>{
      s.addEventListener('mouseenter',e=>showBarTip(e,r.label,r.totalM,r.mPct,r.fPct));
      s.addEventListener('mousemove',e=>moveBarTip(e));
      s.addEventListener('mouseleave',hideBarTip);
    });
    container.appendChild(row);
  });
}

// ─── panel renderer ───────────────────────────────────────────────────────────
function showPanel(id,name){
  document.getElementById('panel-name').textContent=name;
  const body=document.getElementById('panel-body'); const d=DEMO[id];
  if(!d){document.getElementById('panel-pop-val').textContent='—';body.innerHTML='<div style="padding:20px 18px;font-size:12px;color:var(--muted);">No detailed data available for this territory.</div>';return;}
  const[,pop,mp,fp,edu,age,race,income]=d;
  document.getElementById('panel-pop-val').textContent=fmtPop(pop);
  body.innerHTML='';
  // Gender
  const gSec=mkSec('Gender');
  plainBar(gSec,'Male',mp,'male',pop); plainBar(gSec,'Female',fp,'female',pop);
  body.appendChild(gSec);
  // Education
  const eSec=mkSec('Education level');
  splitBar(eSec,[
    {label:"Bachelor's or above", tot:edu[0]+edu[1], mPct:edu[0]/(edu[0]+edu[1])*100, fPct:edu[1]/(edu[0]+edu[1])*100, cm:'eb-m', cf:'eb-f', totalM:pop},
    {label:"Some college / vocational", tot:edu[2]+edu[3], mPct:edu[2]/(edu[2]+edu[3])*100, fPct:edu[3]/(edu[2]+edu[3])*100, cm:'ec-m', cf:'ec-f', totalM:pop},
    {label:"Below college level", tot:edu[4]+edu[5], mPct:edu[4]/(edu[4]+edu[5])*100, fPct:edu[5]/(edu[4]+edu[5])*100, cm:'el-m', cf:'el-f', totalM:pop},
  ]); body.appendChild(eSec);
  // Age
  const aLabels=["Under 18","18 – 40","41 – 64","65 and above"];
  const aCls=[['a0m','a0f'],['a1m','a1f'],['a2m','a2f'],['a3m','a3f']];
  const aSec=mkSec('Age distribution');
  splitBar(aSec,aLabels.map((l,i)=>{const mi=age[i*2],fi=age[i*2+1];return{label:l,tot:mi+fi,mPct:mi/(mi+fi)*100,fPct:fi/(mi+fi)*100,cm:aCls[i][0],cf:aCls[i][1],totalM:pop};}));
  body.appendChild(aSec);
  // Race
  const rSec=mkSec('Racial / ethnic background');
  splitBar(rSec,race.map(r=>{const tot=r[1]+r[2];return{label:r[0],tot,mPct:r[1]/tot*100,fPct:r[2]/tot*100,cm:'rm',cf:'rf',totalM:pop};}));
  body.appendChild(rSec);
  // Income
  const iSec=mkSec('Household income (USD)');
  splitBar(iSec,income.map(r=>{const tot=r[1]+r[2];return{label:r[0],tot,mPct:r[1]/tot*100,fPct:r[2]/tot*100,cm:'im',cf:'if_',totalM:pop};}));
  const note=document.createElement('div');note.style.cssText='font-size:10px;color:var(--muted);margin-top:8px;line-height:1.6;';note.textContent='% of households by income bracket; male/female = head of household.';iSec.appendChild(note);
  body.appendChild(iSec);
  // Footer
  const foot=document.createElement('div');foot.className='section';foot.style.cssText='border-bottom:none;padding-bottom:20px;';
  foot.innerHTML='<div style="font-size:10px;color:var(--muted);line-height:1.7;">Sources: World Bank, UN Population Division, CIA World Factbook, national census data (latest estimates). Education = adults 25+. Hover any bar to see gender breakdown.</div>';
  body.appendChild(foot);
}
function mkSec(t){const d=document.createElement('div');d.className='section';d.innerHTML=`<div class="section-title">${t}</div>`;return d;}
function plainBar(parent,label,pctVal,cls,totalM){
  const row=document.createElement('div');row.className='bar-row';
  row.innerHTML=`<div class="bar-label"><span class="name">${label}</span><span class="val">${pct(pctVal)}</span></div><div class="bar-track plain"><div class="bar-fill ${cls}" style="width:${pctVal}%"></div></div>`;
  row.querySelector('.bar-track').addEventListener('mouseenter',e=>showBarTip(e,'Gender',totalM,label==='Male'?pctVal:100-pctVal,label==='Female'?pctVal:100-pctVal));
  row.querySelector('.bar-track').addEventListener('mousemove',e=>moveBarTip(e));
  row.querySelector('.bar-track').addEventListener('mouseleave',hideBarTip);
  parent.appendChild(row);
}

// ─── MAP ─────────────────────────────────────────────────────────────────────
const mapEl=document.getElementById('map-container');
const W=mapEl.clientWidth||window.innerWidth-320, H=window.innerHeight-52;
const svg=d3.select('#world-svg').attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet');
const g=svg.append('g');
const projection=d3.geoNaturalEarth1().scale(W/6.3).translate([W/2,H/2]);
const pathGen=d3.geoPath(projection);
const zoom=d3.zoom().scaleExtent([0.5,16]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);
svg.insert('rect','g').attr('width',W).attr('height',H).attr('fill','#0d1a26');
g.append('path').datum(d3.geoGraticule()()).attr('d',pathGen).attr('fill','none').attr('stroke','rgba(255,255,255,0.04)').attr('stroke-width',0.5);

const mapTip=document.getElementById('map-tooltip');
let activeEl=null,activeId=null;

// Use 50m (higher resolution) world atlas
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(world=>{
  document.getElementById('loading').style.display='none';
  const features=topojson.feature(world,world.objects.countries).features;
  g.selectAll('path.cp').data(features).join('path')
    .attr('class','cp')
    .attr('d',pathGen)
    .attr('fill',d=>DEMO[+d.id]?'#1e3a52':'#18242f')
    .attr('stroke','#253545').attr('stroke-width',0.3)
    .on('mousemove',function(ev,d){
      const info=DEMO[+d.id]; const n=info?info[0]:'Unknown territory';
      mapTip.style.display='block';mapTip.style.left=(ev.clientX+12)+'px';mapTip.style.top=(ev.clientY-28)+'px';
      mapTip.textContent=n+(info?' · '+fmtPop(info[1]):'');
      if(this!==activeEl) d3.select(this).attr('fill','#2a5f8a');
    })
    .on('mouseleave',function(ev,d){
      mapTip.style.display='none';
      if(this!==activeEl) d3.select(this).attr('fill',DEMO[+d.id]?'#1e3a52':'#18242f');
    })
    .on('click',function(ev,d){
      if(activeEl){const pid=+d3.select(activeEl).datum().id;d3.select(activeEl).attr('fill',DEMO[pid]?'#1e3a52':'#18242f');}
      activeEl=this; activeId=+d.id;
      d3.select(this).attr('fill','#1565c0');
      const info=DEMO[+d.id]; const n=info?info[0]:'Unknown territory';
      showPanel(+d.id,n); ev.stopPropagation();
    });
  g.append('path').datum(topojson.mesh(world,world.objects.countries,(a,b)=>a!==b)).attr('d',pathGen).attr('fill','none').attr('stroke','#253545').attr('stroke-width',0.25);
  svg.on('click',()=>{
    if(activeEl){d3.select(activeEl).attr('fill',DEMO[activeId]?'#1e3a52':'#18242f');activeEl=null;activeId=null;}
    document.getElementById('panel-name').textContent='—';
    document.getElementById('panel-pop-val').textContent='—';
    document.getElementById('panel-body').innerHTML='<div id="placeholder"><div class="ph">🌍</div>Click any country on the map to see demographic data here.</div>';
  });
}).catch(()=>{document.getElementById('loading').innerHTML='<p style="color:#ef9a9a;font-size:12px;">Failed to load map. Please refresh.</p>';});

document.getElementById('zoom-in').onclick=()=>svg.transition().call(zoom.scaleBy,1.5);
document.getElementById('zoom-out').onclick=()=>svg.transition().call(zoom.scaleBy,0.67);
document.getElementById('zoom-reset').onclick=()=>svg.transition().call(zoom.transform,d3.zoomIdentity);
mapEl.addEventListener('mousedown',()=>mapEl.classList.add('panning'));
window.addEventListener('mouseup',()=>mapEl.classList.remove('panning'));
</script>
</body>
</html>
